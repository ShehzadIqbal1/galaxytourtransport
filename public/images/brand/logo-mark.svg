<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="Galaxy Tour &amp; Transport">
  <defs>
    <linearGradient id="gtGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C577"/>
      <stop offset="55%" stop-color="#C6A15B"/>
      <stop offset="100%" stop-color="#A8843E"/>
    </linearGradient>
    <linearGradient id="gtSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7F3EA" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#EBE3D2"/>
      <stop offset="100%" stop-color="#C8C0B0"/>
    </linearGradient>
  </defs>
  <circle cx="80" cy="80" r="78" fill="#0B0B0C"/>
  <circle cx="80" cy="80" r="74" fill="none" stroke="#C6A15B" stroke-width="1.5" opacity="0.35"/>

  <!-- Motion / vehicle swoosh — original path, not a competitor copy -->
  <path
    fill="none"
    stroke="url(#gtSilver)"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M28 78
       C34 58 48 46 68 42
       C86 38 104 42 118 52
       C128 59 134 70 136 84
       C138 98 132 112 118 120
       C104 128 88 126 78 118"
  />
  <!-- Soft speed trail under the letters -->
  <path
    fill="none"
    stroke="url(#gtSilver)"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.45"
    d="M36 102 C52 108 70 110 92 106"
  />

  <!-- Bold italic GT -->
  <g transform="translate(80 78) skewX(-12) translate(-80 -78)">
    <text
      x="80"
      y="90"
      text-anchor="middle"
      fill="url(#gtGold)"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-size="58"
      font-weight="900"
      letter-spacing="-2"
    >GT</text>
  </g>

  <!-- Script descriptor -->
  <text
    x="80"
    y="128"
    text-anchor="middle"
    fill="#C6A15B"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-style="italic"
    letter-spacing="0.5"
  >Tour &amp; Transport</text>
</svg>
